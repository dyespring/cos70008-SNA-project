# Concept aliases for deduplication.
#
# Purpose: collapse surface variants of the same concept ("the food", "good food",
# "meals") into a single canonical node so PageRank / betweenness / community
# detection aren't diluted by determiners, plurals, and possessives.
#
# Use this file INSTEAD of concept_dictionary.yaml when you want to keep the
# full lexical breadth of the corpus but clean up duplicates:
#
#   python pipeline.py --source combined --neo4j --neo4j-reset \
#       --concept-dictionary config/concept_aliases.yaml
#
# Matching rules (enforced by src/extensions/concept_dictionary.py):
#   * mode: merge_only  → canonical wins, aliases get absorbed, everything else is kept.
#   * Matching is exact after lowercase + whitespace collapse. No regex.
#   * If you want an alias to NOT be dropped, list it as its own canonical.
#
# Curated from the actual 1804-concept run on combined policy + yelp data.
# Top clusters discovered via Neo4j vector search (cosine > 0.90 neighbours).

mode: merge_only

entries:
